<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>YouTube AB Loop (Pro Version)</title>

<style>

/* 경기천년제목체 추가 */
@font-face {
    font-family: 'GyeonggiTitle';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Title_Medium.woff') format('woff');
    font-weight: 500;
    font-style: normal;
}
    
/* 🎨 기본 스타일 및 다크모드 변수 설정 */
:root {
    --bg-color: #e8e8e8;
    --text-color: #000;
    --box-bg: white;
    --border-color: #ccc;
    --btn-bg: #f0f0f0;
    --btn-hover: #e0e0e0;
}

body.dark-mode {
    --bg-color: #1e1e1e;
    --text-color: #f5f5f5;
    --box-bg: #2c2c2c;
    --border-color: #444;
    --btn-bg: #444;
    --btn-hover: #555;
}

body {
    font-family: 'GyeonggiTitle', sans-serif;
    margin: 20px;
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: background-color 0.3s, color 0.3s;
}
//메모장 입력
input {
    padding: 8px;
    margin: 4px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background-color: var(--box-bg);
    color: var(--text-color);
    transition: background-color 0.3s, color 0.3s, border-color 0.3s;
}

button {
    padding: 8px 14px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    cursor: pointer;
    background-color: var(--btn-bg);
    color: var(--text-color);
    transition: background-color 0.2s;
}

button:hover {
    background-color: var(--btn-hover);
}

.video-item {
    margin-top: 20px;
    padding: 15px;
    width: min(1200px, 90vw);
    margin: 20px auto;
    background: var(--box-bg);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    transition: background-color 0.3s;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.header-buttons {
    display: flex;
    gap: 8px;
}

/* 📝 영상과 메모를 나란히 배치하기 위한 레이아웃 */
.video-body {
    display: flex;
    gap: 15px;
    flex-direction: row;
}

.player-container {
    flex: 6.5; /* 영상 비율 */
}

.player {
    width: 100%;
    aspect-ratio: 16 / 9;
}

.memo-container {
    flex: 3.5; /* 메모장 비율 */
    display: flex;
    flex-direction: column;
}

.memo-container textarea {
    flex-grow: 1;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background-color: var(--box-bg);
    color: var(--text-color);
    resize: none;
    font-family: inherit;
    line-height: 1.5;
}

/* 📱 모바일 화면에서는 메모장이 영상 아래로 내려가도록 처리 */
@media (max-width: 768px) {
    .video-body {
        flex-direction: column;
    }
    .memo-container textarea {
        min-height: 150px;
    }
}
</style>
</head>

<body>

<h2>YouTube AB Loop (Pro)</h2>

<input id="url" placeholder="유튜브 링크" size="50">
<input id="start" type="number" placeholder="시작초" style="width: 70px;">
<input id="end" type="number" placeholder="종료초" style="width: 70px;">

<button onclick="createLoop()">생성</button>
<button onclick="clearAll()">전체 삭제</button>
<button id="themeBtn" onclick="toggleDarkMode()">다크모드 🌙</button> <div id="videos"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// 🚨 여기에 Firebase 설정 값을 넣으세요!
  const firebaseConfig = {
    apiKey: "AIzaSyD7va4fNbe_T4dyEDVmxg-IW_ccvrM1Zvw",
    authDomain: "ytubeclp.firebaseapp.com",
    projectId: "ytubeclp",
    storageBucket: "ytubeclp.firebasestorage.app",
    messagingSenderId: "81831868656",
    appId: "1:81831868656:web:6226c1e878b4483da2ea35",
    measurementId: "G-QYGLD5Q5RH"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("myApp").doc("loopData");

let playerIndex = 0;
const loops = [];

// 🌙 다크모드 토글 로직
let isDarkMode = false;
function toggleDarkMode() {
    isDarkMode = !isDarkMode;
    document.body.classList.toggle("dark-mode", isDarkMode);
    document.getElementById("themeBtn").innerText = isDarkMode ? "라이트모드 ☀️" : "다크모드 🌙";
}

// 🟢 정규식 수정됨 (라이브 주소 지원)
function extractVideoId(url) {
    const patterns = [
        /youtu\.be\/([^?&]+)/,
        /v=([^&]+)/,
        /embed\/([^?&]+)/,
        /\/live\/([^?&]+)/ 
    ];
    for (const p of patterns) {
        const match = url.match(p);
        if (match) return match[1];
    }
    return null;
}

// 🟢 저장 시 메모(memo) 필드 추가
async function saveLoops() {
    const data = [];
    for (const loop of loops) {
        if (!loop) continue;
        data.push({
            videoId: loop.videoId,
            start: loop.start,
            end: loop.end,
            title: loop.title,
            memo: loop.memo || "" // 메모가 없으면 빈칸 저장
        });
    }

    try {
        await docRef.set({ ytLoops: data });
    } catch (error) {
        console.error("저장 실패:", error);
    }
}

// 🟢 불러올 때 메모(memo) 데이터도 함께 전달
async function loadLoops() {
    try {
        const docSnap = await docRef.get();
        if (!docSnap.exists) return;

        const data = docSnap.data().ytLoops || [];
        for (const item of data) {
            await createLoopFromData(
                item.videoId,
                item.start,
                item.end,
                item.title,
                item.memo
            );
        }
    } catch (error) {
        console.error("불러오기 실패:", error);
    }
}

async function createLoop() {
    const url = document.getElementById("url").value.trim();
    const start = Number(document.getElementById("start").value);
    const end = Number(document.getElementById("end").value);

    if (!url || end <= start) {
        alert("입력값 확인 (종료초가 시작초보다 커야 합니다)");
        return;
    }

    const videoId = extractVideoId(url);
    if (!videoId) {
        alert("영상 ID 추출 실패");
        return;
    }

    await createLoopFromData(videoId, start, end);
    saveLoops();

    document.getElementById("url").value = "";
    document.getElementById("start").value = "";
    document.getElementById("end").value = "";
}

// 🟢 생성 함수에 메모(memo) 매개변수 및 UI 레이아웃 추가
async function createLoopFromData(videoId, start, end, savedTitle = null, memo = "") {
    let title = savedTitle || videoId;

    if (!savedTitle) {
        try {
            const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
            const data = await res.json();
            title = data.title;
        } catch {}
    }

    const idx = playerIndex++;
    const wrapper = document.createElement("div");
    wrapper.className = "video-item";
    wrapper.id = `wrapper-${idx}`;

    // 🟢 HTML 구조 변경 (수정 버튼 추가, 메모장 추가)
    wrapper.innerHTML = `
        <div class="header">
            <span id="title-${idx}"><b>${title}</b> (${start}~${end}초)</span>
            <div class="header-buttons">
                <button onclick="editLoop(${idx})">시간 수정</button>
                <button onclick="removeLoop(${idx})">삭제</button>
            </div>
        </div>

        <div class="video-body">
            <div class="player-container">
                <div id="player-${idx}" class="player"></div>
            </div>
            <div class="memo-container">
                <textarea id="memo-${idx}" placeholder="여기에 메모를 작성하세요... (작성 후 다른 곳을 클릭하면 자동 저장됩니다)" onchange="updateMemo(${idx})">${memo}</textarea>
            </div>
        </div>
    `;

    document.getElementById("videos").appendChild(wrapper);

    loops[idx] = {
        videoId,
        start,
        end,
        title,
        memo,
        player: null,
        interval: null
    };

    createPlayer(idx, videoId);
}

function createPlayer(idx, videoId) {
    const loop = loops[idx];

    loop.player = new YT.Player(`player-${idx}`, {
        videoId: videoId,
        playerVars: {
            autoplay: 1,
            start: loop.start
        },
        events: {
            onReady(event) {
                event.target.playVideo();
                loop.interval = setInterval(() => {
                    try {
                        const current = event.target.getCurrentTime();
                        // 🟢 수정된 시간을 바로 반영하기 위해 loop.end를 참조
                        if (current >= loop.end || current < loop.start) {
                            event.target.seekTo(loop.start, true);
                        }
                    } catch {}
                }, 100);
            }
        }
    });
}

// 🟢 새로운 기능: 시간 수정
function editLoop(idx) {
    const loop = loops[idx];
    if (!loop) return;

    const newStart = prompt("새로운 시작 시간(초)을 입력하세요:", loop.start);
    if (newStart === null) return; // 취소 누름
    
    const newEnd = prompt("새로운 종료 시간(초)을 입력하세요:", loop.end);
    if (newEnd === null) return; // 취소 누름

    const startNum = Number(newStart);
    const endNum = Number(newEnd);

    if (isNaN(startNum) || isNaN(endNum) || startNum >= endNum) {
        alert("올바른 숫자를 입력해주세요 (시작초 < 종료초).");
        return;
    }

    // 데이터 업데이트
    loop.start = startNum;
    loop.end = endNum;

    // 화면 텍스트 업데이트
    document.getElementById(`title-${idx}`).innerHTML = `<b>${loop.title}</b> (${loop.start}~${loop.end}초)`;

    // 영상 재생 위치 즉시 이동
    if (loop.player && loop.player.seekTo) {
        loop.player.seekTo(loop.start, true);
    }

    // DB 저장
    saveLoops();
}

// 🟢 새로운 기능: 메모 내용 저장 (입력칸을 벗어날 때 실행됨)
function updateMemo(idx) {
    const loop = loops[idx];
    if (!loop) return;
    
    const memoText = document.getElementById(`memo-${idx}`).value;
    loop.memo = memoText;
    
    saveLoops();
}

function removeLoop(idx) {
    if (!confirm("정말 삭제할까?")) return;
    
    const loop = loops[idx];
    if (!loop) return;

    clearInterval(loop.interval);
    if (loop.player) loop.player.destroy();

    document.getElementById(`wrapper-${idx}`)?.remove();
    delete loops[idx];

    saveLoops();
}

function clearAll() {
    if (!confirm("저장된 모든 영상을 삭제할까?")) return;
    
    for (const loop of loops) {
        if (!loop) continue;
        clearInterval(loop.interval);
        if (loop.player) loop.player.destroy();
    }

    document.getElementById("videos").innerHTML = "";
    loops.length = 0;

    saveLoops();
}

window.addEventListener("load", async () => {
    await loadLoops();
});
</script>

</body>
</html>
