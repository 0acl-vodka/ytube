<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유튜브는 클립기능을 복원해라(Gemini Version)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>YouTube AB Loop (Pro)</h2>

<input id="url" placeholder="유튜브 링크" size="50">
<input id="start" type="number" placeholder="시작초" style="width: 70px;">
<input id="end" type="number" placeholder="종료초" style="width: 70px;">

<button onclick="createLoop()">생성</button>
<button onclick="clearAll()">전체 삭제</button>
<button id="themeBtn" onclick="toggleDarkMode()">다크모드 🌙</button> <div id="videos"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
